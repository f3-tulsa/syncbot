# Deploy SyncBot to AWS (SAM). See docs/DEPLOY.md and docs/INFRA_CONTRACT.md.
# To use GCP instead: set repository variable DEPLOY_TARGET=gcp and disable this workflow.
#
# Secrets are passed as SAM parameters with NoEcho — no AWS Secrets Manager dependency.

name: Deploy (AWS)

on:
  push:
    branches:
      - test
      - prod
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - test
          - prod

concurrency:
  group: deploy-${{ github.event.inputs.environment || github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

# Skip when using GCP (set DEPLOY_TARGET=gcp to use deploy-gcp.yml instead)
jobs:
  sam-build:
    if: vars.DEPLOY_TARGET != 'gcp'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Validate SAM templates (cfn-lint)
        run: |
          sam validate -t infra/aws/template.yaml --lint
          sam validate -t infra/aws/template.bootstrap.yaml --lint

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - run: sam build -t infra/aws/template.yaml

      - name: Publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-artifact
          path: |
            ./.aws-sam/build
            ./infra/aws/template.bootstrap.yaml

  sam-deploy-test:
    if: (github.ref == 'refs/heads/test') || (github.event.inputs.environment == 'test')
    runs-on: ubuntu-latest
    environment: test
    needs: sam-build
    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: './.aws-sam/build'

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Sync bootstrap stack (if template changed)
        run: |
          STACK="${{ vars.BOOTSTRAP_STACK_NAME || 'syncbot-bootstrap' }}"
          REGION="${{ vars.AWS_REGION }}"
          if ! aws cloudformation describe-stacks --stack-name "$STACK" --region "$REGION" >/dev/null 2>&1; then
            echo "Bootstrap stack '$STACK' does not exist; skipping sync (run --bootstrap locally first)."
            exit 0
          fi
          CURRENT_TEMPLATE=$(aws cloudformation get-template --stack-name "$STACK" --region "$REGION" --query TemplateBody --output json)
          NEW_HASH=$(sha256sum infra/aws/template.bootstrap.yaml | cut -d' ' -f1)
          OLD_HASH=$(echo "$CURRENT_TEMPLATE" | sha256sum | cut -d' ' -f1)
          if [[ "$NEW_HASH" == "$OLD_HASH" ]]; then
            echo "Bootstrap template unchanged; skipping sync."
            exit 0
          fi
          echo "Bootstrap template changed; syncing..."
          PARAMS=$(aws cloudformation describe-stacks --stack-name "$STACK" --region "$REGION" \
            --query "Stacks[0].Parameters" --output json)
          GH_REPO=$(echo "$PARAMS" | jq -r '.[] | select(.ParameterKey=="GitHubRepository") | .ParameterValue')
          CREATE_OIDC=$(echo "$PARAMS" | jq -r '.[] | select(.ParameterKey=="CreateOIDCProvider") | .ParameterValue')
          BUCKET_PREFIX=$(echo "$PARAMS" | jq -r '.[] | select(.ParameterKey=="DeploymentBucketPrefix") | .ParameterValue')
          aws cloudformation deploy \
            --template-file infra/aws/template.bootstrap.yaml \
            --stack-name "$STACK" \
            --parameter-overrides \
              "GitHubRepository=$GH_REPO" \
              "CreateOIDCProvider=${CREATE_OIDC:-true}" \
              "DeploymentBucketPrefix=${BUCKET_PREFIX:-syncbot-deploy}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "$REGION" \
            --no-fail-on-empty-changeset

      - name: Deploy to test
        run: |
          sam deploy \
            -t .aws-sam/build/template.yaml \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name ${{ vars.AWS_STACK_NAME }} \
            --s3-bucket ${{ vars.AWS_S3_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --region ${{ vars.AWS_REGION }} \
            --no-disable-rollback \
            --force-upload \
            --parameter-overrides \
              "Stage=${{ vars.STAGE_NAME }} \
               DatabaseEngine=${{ vars.DATABASE_ENGINE || 'mysql' }} \
               TokenEncryptionKey=${{ secrets.TOKEN_ENCRYPTION_KEY }} \
               DatabasePassword=${{ secrets.DATABASE_PASSWORD }} \
               DatabaseUser=${{ secrets.DATABASE_USER }} \
               ExistingDatabaseHost=${{ vars.EXISTING_DATABASE_HOST }} \
               ExistingDatabaseAdminUser=${{ vars.EXISTING_DATABASE_ADMIN_USER }} \
               ExistingDatabaseAdminPassword=${{ secrets.EXISTING_DATABASE_ADMIN_PASSWORD }} \
               ExistingDatabaseNetworkMode=${{ vars.EXISTING_DATABASE_NETWORK_MODE || 'public' }} \
               ExistingDatabaseSubnetIdsCsv=${{ vars.EXISTING_DATABASE_SUBNET_IDS_CSV }} \
               ExistingDatabaseLambdaSecurityGroupId=${{ vars.EXISTING_DATABASE_LAMBDA_SECURITY_GROUP_ID }} \
               ExistingDatabasePort=${{ vars.EXISTING_DATABASE_PORT }} \
               ExistingDatabaseCreateAppUser=${{ vars.EXISTING_DATABASE_CREATE_APP_USER || 'true' }} \
               ExistingDatabaseCreateSchema=${{ vars.EXISTING_DATABASE_CREATE_SCHEMA || 'true' }} \
               ExistingDatabaseUsernamePrefix=${{ vars.EXISTING_DATABASE_USERNAME_PREFIX }} \
               ExistingDatabaseAppUsername=${{ vars.EXISTING_DATABASE_APP_USERNAME }} \
               DatabaseSchema=${{ vars.DATABASE_SCHEMA }} \
               LogLevel=${{ vars.LOG_LEVEL || 'INFO' }} \
               RequireAdmin=${{ vars.REQUIRE_ADMIN || 'true' }} \
               SoftDeleteRetentionDays=${{ vars.SOFT_DELETE_RETENTION_DAYS || '30' }} \
               SyncbotFederationEnabled=${{ vars.SYNCBOT_FEDERATION_ENABLED || 'false' }} \
               SyncbotInstanceId=${{ vars.SYNCBOT_INSTANCE_ID }} \
               SyncbotPublicUrl=${{ vars.SYNCBOT_PUBLIC_URL }} \
               PrimaryWorkspace=${{ vars.PRIMARY_WORKSPACE }} \
               EnableDbReset=${{ vars.ENABLE_DB_RESET }} \
               EnableXRay=${{ vars.ENABLE_XRAY || 'false' }} \
               SlackClientID=${{ vars.SLACK_CLIENT_ID }} \
               SlackClientSecret=${{ secrets.SLACK_CLIENT_SECRET }} \
               SlackSigningSecret=${{ secrets.SLACK_SIGNING_SECRET }}"

      - name: Run migrations and warm up Lambda
        run: |
          FUNCTION_ARN=$(aws cloudformation describe-stacks \
            --stack-name ${{ vars.AWS_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='SyncBotFunctionArn'].OutputValue" \
            --output text)
          aws lambda invoke \
            --function-name "$FUNCTION_ARN" \
            --payload '{"action":"migrate"}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/migrate-response.json
          cat /tmp/migrate-response.json

      - name: Post-deploy summary
        run: |
          STACK=${{ vars.AWS_STACK_NAME }}
          API_URL=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='SyncBotApiUrl'].OutputValue" --output text)
          INSTALL_URL=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='SyncBotInstallUrl'].OutputValue" --output text)
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## SyncBot Deploy (test)
          - **Stack**: $STACK
          - **API URL**: $API_URL
          - **Install URL**: $INSTALL_URL
          EOF

  sam-deploy-prod:
    if: (github.ref == 'refs/heads/prod') || (github.event.inputs.environment == 'prod')
    runs-on: ubuntu-latest
    environment: prod
    needs: sam-build
    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: './.aws-sam/build'

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Sync bootstrap stack (if template changed)
        run: |
          STACK="${{ vars.BOOTSTRAP_STACK_NAME || 'syncbot-bootstrap' }}"
          REGION="${{ vars.AWS_REGION }}"
          if ! aws cloudformation describe-stacks --stack-name "$STACK" --region "$REGION" >/dev/null 2>&1; then
            echo "Bootstrap stack '$STACK' does not exist; skipping sync (run --bootstrap locally first)."
            exit 0
          fi
          CURRENT_TEMPLATE=$(aws cloudformation get-template --stack-name "$STACK" --region "$REGION" --query TemplateBody --output json)
          NEW_HASH=$(sha256sum infra/aws/template.bootstrap.yaml | cut -d' ' -f1)
          OLD_HASH=$(echo "$CURRENT_TEMPLATE" | sha256sum | cut -d' ' -f1)
          if [[ "$NEW_HASH" == "$OLD_HASH" ]]; then
            echo "Bootstrap template unchanged; skipping sync."
            exit 0
          fi
          echo "Bootstrap template changed; syncing..."
          PARAMS=$(aws cloudformation describe-stacks --stack-name "$STACK" --region "$REGION" \
            --query "Stacks[0].Parameters" --output json)
          GH_REPO=$(echo "$PARAMS" | jq -r '.[] | select(.ParameterKey=="GitHubRepository") | .ParameterValue')
          CREATE_OIDC=$(echo "$PARAMS" | jq -r '.[] | select(.ParameterKey=="CreateOIDCProvider") | .ParameterValue')
          BUCKET_PREFIX=$(echo "$PARAMS" | jq -r '.[] | select(.ParameterKey=="DeploymentBucketPrefix") | .ParameterValue')
          aws cloudformation deploy \
            --template-file infra/aws/template.bootstrap.yaml \
            --stack-name "$STACK" \
            --parameter-overrides \
              "GitHubRepository=$GH_REPO" \
              "CreateOIDCProvider=${CREATE_OIDC:-true}" \
              "DeploymentBucketPrefix=${BUCKET_PREFIX:-syncbot-deploy}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "$REGION" \
            --no-fail-on-empty-changeset

      - name: Deploy to prod
        run: |
          sam deploy \
            -t .aws-sam/build/template.yaml \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name ${{ vars.AWS_STACK_NAME }} \
            --s3-bucket ${{ vars.AWS_S3_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --region ${{ vars.AWS_REGION }} \
            --no-disable-rollback \
            --force-upload \
            --parameter-overrides \
              "Stage=${{ vars.STAGE_NAME }} \
               DatabaseEngine=${{ vars.DATABASE_ENGINE || 'mysql' }} \
               TokenEncryptionKey=${{ secrets.TOKEN_ENCRYPTION_KEY }} \
               DatabasePassword=${{ secrets.DATABASE_PASSWORD }} \
               DatabaseUser=${{ secrets.DATABASE_USER }} \
               ExistingDatabaseHost=${{ vars.EXISTING_DATABASE_HOST }} \
               ExistingDatabaseAdminUser=${{ vars.EXISTING_DATABASE_ADMIN_USER }} \
               ExistingDatabaseAdminPassword=${{ secrets.EXISTING_DATABASE_ADMIN_PASSWORD }} \
               ExistingDatabaseNetworkMode=${{ vars.EXISTING_DATABASE_NETWORK_MODE || 'public' }} \
               ExistingDatabaseSubnetIdsCsv=${{ vars.EXISTING_DATABASE_SUBNET_IDS_CSV }} \
               ExistingDatabaseLambdaSecurityGroupId=${{ vars.EXISTING_DATABASE_LAMBDA_SECURITY_GROUP_ID }} \
               ExistingDatabasePort=${{ vars.EXISTING_DATABASE_PORT }} \
               ExistingDatabaseCreateAppUser=${{ vars.EXISTING_DATABASE_CREATE_APP_USER || 'true' }} \
               ExistingDatabaseCreateSchema=${{ vars.EXISTING_DATABASE_CREATE_SCHEMA || 'true' }} \
               ExistingDatabaseUsernamePrefix=${{ vars.EXISTING_DATABASE_USERNAME_PREFIX }} \
               ExistingDatabaseAppUsername=${{ vars.EXISTING_DATABASE_APP_USERNAME }} \
               DatabaseSchema=${{ vars.DATABASE_SCHEMA }} \
               LogLevel=${{ vars.LOG_LEVEL || 'INFO' }} \
               RequireAdmin=${{ vars.REQUIRE_ADMIN || 'true' }} \
               SoftDeleteRetentionDays=${{ vars.SOFT_DELETE_RETENTION_DAYS || '30' }} \
               SyncbotFederationEnabled=${{ vars.SYNCBOT_FEDERATION_ENABLED || 'false' }} \
               SyncbotInstanceId=${{ vars.SYNCBOT_INSTANCE_ID }} \
               SyncbotPublicUrl=${{ vars.SYNCBOT_PUBLIC_URL }} \
               PrimaryWorkspace=${{ vars.PRIMARY_WORKSPACE }} \
               EnableDbReset=${{ vars.ENABLE_DB_RESET }} \
               EnableXRay=${{ vars.ENABLE_XRAY || 'false' }} \
               SlackClientID=${{ vars.SLACK_CLIENT_ID }} \
               SlackClientSecret=${{ secrets.SLACK_CLIENT_SECRET }} \
               SlackSigningSecret=${{ secrets.SLACK_SIGNING_SECRET }}"

      - name: Run migrations and warm up Lambda
        run: |
          FUNCTION_ARN=$(aws cloudformation describe-stacks \
            --stack-name ${{ vars.AWS_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='SyncBotFunctionArn'].OutputValue" \
            --output text)
          aws lambda invoke \
            --function-name "$FUNCTION_ARN" \
            --payload '{"action":"migrate"}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/migrate-response.json
          cat /tmp/migrate-response.json

      - name: Post-deploy summary
        run: |
          STACK=${{ vars.AWS_STACK_NAME }}
          API_URL=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='SyncBotApiUrl'].OutputValue" --output text)
          INSTALL_URL=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='SyncBotInstallUrl'].OutputValue" --output text)
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## SyncBot Deploy (prod)
          - **Stack**: $STACK
          - **API URL**: $API_URL
          - **Install URL**: $INSTALL_URL
          EOF
