# Deploy SyncBot to AWS (SAM). See docs/DEPLOY.md and docs/INFRA_CONTRACT.md.
# To use GCP instead: set repository variable DEPLOY_TARGET=gcp and disable this workflow.
#
# Secrets are passed as SAM parameters with NoEcho — no AWS Secrets Manager dependency.

name: Deploy (AWS)

on:
  push:
    branches:
      - test
      - prod
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - test
          - prod

concurrency:
  group: deploy-${{ github.event.inputs.environment || github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

# Skip when using GCP (set DEPLOY_TARGET=gcp to use deploy-gcp.yml instead)
jobs:
  sam-build:
    if: vars.DEPLOY_TARGET != 'gcp'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Validate SAM templates (cfn-lint)
        run: |
          sam validate -t infra/aws/template.yaml --lint
          sam validate -t infra/aws/template.bootstrap.yaml --lint

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - run: sam build -t infra/aws/template.yaml

      - name: Publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-artifact
          path: |
            ./.aws-sam/build
            ./infra/aws/template.bootstrap.yaml

  sam-deploy-test:
    if: (github.ref == 'refs/heads/test') || (github.event.inputs.environment == 'test')
    runs-on: ubuntu-latest
    environment: test
    needs: sam-build
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: './.aws-sam/build'

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Sync bootstrap stack (if template changed)
        run: |
          STACK="${{ vars.BOOTSTRAP_STACK_NAME || 'syncbot-bootstrap' }}"
          REGION="${{ vars.AWS_REGION }}"
          if ! aws cloudformation describe-stacks --stack-name "$STACK" --region "$REGION" >/dev/null 2>&1; then
            echo "Bootstrap stack '$STACK' does not exist; skipping sync (run --bootstrap locally first)."
            exit 0
          fi
          CURRENT_TEMPLATE=$(aws cloudformation get-template --stack-name "$STACK" --region "$REGION" --query TemplateBody --output json)
          NEW_HASH=$(sha256sum infra/aws/template.bootstrap.yaml | cut -d' ' -f1)
          OLD_HASH=$(echo "$CURRENT_TEMPLATE" | sha256sum | cut -d' ' -f1)
          if [[ "$NEW_HASH" == "$OLD_HASH" ]]; then
            echo "Bootstrap template unchanged; skipping sync."
            exit 0
          fi
          echo "Bootstrap template changed; syncing..."
          PARAMS=$(aws cloudformation describe-stacks --stack-name "$STACK" --region "$REGION" \
            --query "Stacks[0].Parameters" --output json)
          GH_REPO=$(echo "$PARAMS" | jq -r '.[] | select(.ParameterKey=="GitHubRepository") | .ParameterValue')
          CREATE_OIDC=$(echo "$PARAMS" | jq -r '.[] | select(.ParameterKey=="CreateOIDCProvider") | .ParameterValue')
          BUCKET_PREFIX=$(echo "$PARAMS" | jq -r '.[] | select(.ParameterKey=="DeploymentBucketPrefix") | .ParameterValue')
          aws cloudformation deploy \
            --template-file infra/aws/template.bootstrap.yaml \
            --stack-name "$STACK" \
            --parameter-overrides \
              "GitHubRepository=$GH_REPO" \
              "CreateOIDCProvider=${CREATE_OIDC:-true}" \
              "DeploymentBucketPrefix=${BUCKET_PREFIX:-syncbot-deploy}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "$REGION" \
            --no-fail-on-empty-changeset

      - name: Deploy to test
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
          AWS_STACK_NAME: ${{ vars.AWS_STACK_NAME }}
          STAGE_NAME: ${{ vars.STAGE_NAME }}
          DATABASE_ENGINE: ${{ vars.DATABASE_ENGINE || 'mysql' }}
          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ vars.DATABASE_HOST }}
          DATABASE_ADMIN_USER: ${{ vars.DATABASE_ADMIN_USER }}
          DATABASE_ADMIN_PASSWORD: ${{ secrets.DATABASE_ADMIN_PASSWORD }}
          DATABASE_NETWORK_MODE: ${{ vars.DATABASE_NETWORK_MODE || 'public' }}
          DATABASE_SUBNET_IDS_CSV: ${{ vars.DATABASE_SUBNET_IDS_CSV }}
          DATABASE_LAMBDA_SECURITY_GROUP_ID: ${{ vars.DATABASE_LAMBDA_SECURITY_GROUP_ID }}
          DATABASE_PORT: ${{ vars.DATABASE_PORT }}
          DATABASE_CREATE_APP_USER: ${{ vars.DATABASE_CREATE_APP_USER || 'true' }}
          DATABASE_CREATE_SCHEMA: ${{ vars.DATABASE_CREATE_SCHEMA || 'true' }}
          DATABASE_USERNAME_PREFIX: ${{ vars.DATABASE_USERNAME_PREFIX }}
          DATABASE_APP_USERNAME: ${{ vars.DATABASE_APP_USERNAME }}
          DATABASE_SCHEMA: ${{ vars.DATABASE_SCHEMA }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
          REQUIRE_ADMIN: ${{ vars.REQUIRE_ADMIN || 'true' }}
          SOFT_DELETE_RETENTION_DAYS: ${{ vars.SOFT_DELETE_RETENTION_DAYS || '30' }}
          SYNCBOT_FEDERATION_ENABLED: ${{ vars.SYNCBOT_FEDERATION_ENABLED || 'false' }}
          SYNCBOT_INSTANCE_ID: ${{ vars.SYNCBOT_INSTANCE_ID }}
          SYNCBOT_PUBLIC_URL: ${{ vars.SYNCBOT_PUBLIC_URL }}
          PRIMARY_WORKSPACE: ${{ vars.PRIMARY_WORKSPACE }}
          ENABLE_DB_RESET: ${{ vars.ENABLE_DB_RESET }}
          ENABLE_XRAY: ${{ vars.ENABLE_XRAY || 'false' }}
          SLACK_CLIENT_ID: ${{ vars.SLACK_CLIENT_ID }}
          SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
        run: bash infra/aws/scripts/ci_sam_deploy_with_fallback.sh

      - name: Run migrations and warm up Lambda
        run: |
          FUNCTION_ARN=$(aws cloudformation describe-stacks \
            --stack-name ${{ vars.AWS_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='SyncBotFunctionArn'].OutputValue" \
            --output text)
          aws lambda invoke \
            --function-name "$FUNCTION_ARN" \
            --payload '{"action":"migrate"}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/migrate-response.json
          cat /tmp/migrate-response.json

      - name: Post-deploy summary
        run: |
          STACK=${{ vars.AWS_STACK_NAME }}
          API_URL=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='SyncBotApiUrl'].OutputValue" --output text)
          INSTALL_URL=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='SyncBotInstallUrl'].OutputValue" --output text)
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## SyncBot Deploy (test)
          - **Stack**: $STACK
          - **API URL**: $API_URL
          - **Install URL**: $INSTALL_URL
          EOF

  sam-deploy-prod:
    if: (github.ref == 'refs/heads/prod') || (github.event.inputs.environment == 'prod')
    runs-on: ubuntu-latest
    environment: prod
    needs: sam-build
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: './.aws-sam/build'

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Sync bootstrap stack (if template changed)
        run: |
          STACK="${{ vars.BOOTSTRAP_STACK_NAME || 'syncbot-bootstrap' }}"
          REGION="${{ vars.AWS_REGION }}"
          if ! aws cloudformation describe-stacks --stack-name "$STACK" --region "$REGION" >/dev/null 2>&1; then
            echo "Bootstrap stack '$STACK' does not exist; skipping sync (run --bootstrap locally first)."
            exit 0
          fi
          CURRENT_TEMPLATE=$(aws cloudformation get-template --stack-name "$STACK" --region "$REGION" --query TemplateBody --output json)
          NEW_HASH=$(sha256sum infra/aws/template.bootstrap.yaml | cut -d' ' -f1)
          OLD_HASH=$(echo "$CURRENT_TEMPLATE" | sha256sum | cut -d' ' -f1)
          if [[ "$NEW_HASH" == "$OLD_HASH" ]]; then
            echo "Bootstrap template unchanged; skipping sync."
            exit 0
          fi
          echo "Bootstrap template changed; syncing..."
          PARAMS=$(aws cloudformation describe-stacks --stack-name "$STACK" --region "$REGION" \
            --query "Stacks[0].Parameters" --output json)
          GH_REPO=$(echo "$PARAMS" | jq -r '.[] | select(.ParameterKey=="GitHubRepository") | .ParameterValue')
          CREATE_OIDC=$(echo "$PARAMS" | jq -r '.[] | select(.ParameterKey=="CreateOIDCProvider") | .ParameterValue')
          BUCKET_PREFIX=$(echo "$PARAMS" | jq -r '.[] | select(.ParameterKey=="DeploymentBucketPrefix") | .ParameterValue')
          aws cloudformation deploy \
            --template-file infra/aws/template.bootstrap.yaml \
            --stack-name "$STACK" \
            --parameter-overrides \
              "GitHubRepository=$GH_REPO" \
              "CreateOIDCProvider=${CREATE_OIDC:-true}" \
              "DeploymentBucketPrefix=${BUCKET_PREFIX:-syncbot-deploy}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "$REGION" \
            --no-fail-on-empty-changeset

      - name: Deploy to prod
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
          AWS_STACK_NAME: ${{ vars.AWS_STACK_NAME }}
          STAGE_NAME: ${{ vars.STAGE_NAME }}
          DATABASE_ENGINE: ${{ vars.DATABASE_ENGINE || 'mysql' }}
          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ vars.DATABASE_HOST }}
          DATABASE_ADMIN_USER: ${{ vars.DATABASE_ADMIN_USER }}
          DATABASE_ADMIN_PASSWORD: ${{ secrets.DATABASE_ADMIN_PASSWORD }}
          DATABASE_NETWORK_MODE: ${{ vars.DATABASE_NETWORK_MODE || 'public' }}
          DATABASE_SUBNET_IDS_CSV: ${{ vars.DATABASE_SUBNET_IDS_CSV }}
          DATABASE_LAMBDA_SECURITY_GROUP_ID: ${{ vars.DATABASE_LAMBDA_SECURITY_GROUP_ID }}
          DATABASE_PORT: ${{ vars.DATABASE_PORT }}
          DATABASE_CREATE_APP_USER: ${{ vars.DATABASE_CREATE_APP_USER || 'true' }}
          DATABASE_CREATE_SCHEMA: ${{ vars.DATABASE_CREATE_SCHEMA || 'true' }}
          DATABASE_USERNAME_PREFIX: ${{ vars.DATABASE_USERNAME_PREFIX }}
          DATABASE_APP_USERNAME: ${{ vars.DATABASE_APP_USERNAME }}
          DATABASE_SCHEMA: ${{ vars.DATABASE_SCHEMA }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
          REQUIRE_ADMIN: ${{ vars.REQUIRE_ADMIN || 'true' }}
          SOFT_DELETE_RETENTION_DAYS: ${{ vars.SOFT_DELETE_RETENTION_DAYS || '30' }}
          SYNCBOT_FEDERATION_ENABLED: ${{ vars.SYNCBOT_FEDERATION_ENABLED || 'false' }}
          SYNCBOT_INSTANCE_ID: ${{ vars.SYNCBOT_INSTANCE_ID }}
          SYNCBOT_PUBLIC_URL: ${{ vars.SYNCBOT_PUBLIC_URL }}
          PRIMARY_WORKSPACE: ${{ vars.PRIMARY_WORKSPACE }}
          ENABLE_DB_RESET: ${{ vars.ENABLE_DB_RESET }}
          ENABLE_XRAY: ${{ vars.ENABLE_XRAY || 'false' }}
          SLACK_CLIENT_ID: ${{ vars.SLACK_CLIENT_ID }}
          SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
        run: bash infra/aws/scripts/ci_sam_deploy_with_fallback.sh

      - name: Run migrations and warm up Lambda
        run: |
          FUNCTION_ARN=$(aws cloudformation describe-stacks \
            --stack-name ${{ vars.AWS_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='SyncBotFunctionArn'].OutputValue" \
            --output text)
          aws lambda invoke \
            --function-name "$FUNCTION_ARN" \
            --payload '{"action":"migrate"}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/migrate-response.json
          cat /tmp/migrate-response.json

      - name: Post-deploy summary
        run: |
          STACK=${{ vars.AWS_STACK_NAME }}
          API_URL=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='SyncBotApiUrl'].OutputValue" --output text)
          INSTALL_URL=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='SyncBotInstallUrl'].OutputValue" --output text)
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## SyncBot Deploy (prod)
          - **Stack**: $STACK
          - **API URL**: $API_URL
          - **Install URL**: $INSTALL_URL
          EOF
